services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: china_web_db
      POSTGRES_USER: china_web
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?Set POSTGRES_PASSWORD}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U china_web -d china_web_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
    depends_on:
      db:
        condition: service_healthy
    environment:
      APP_NAME: China Web API
      ENVIRONMENT: production
      DEBUG: "false"
      DOCS_ENABLED: "false"
      API_V1_PREFIX: /api/v1
      DATABASE_URL: postgresql+psycopg://china_web:${POSTGRES_PASSWORD}@db:5432/china_web_db
      ALLOWED_ORIGINS: ${ALLOWED_ORIGINS:-http://localhost:8080}
      TRUSTED_HOSTS: ${TRUSTED_HOSTS:-localhost,127.0.0.1,backend}
      AUTH_SECRET_KEY: ${AUTH_SECRET_KEY:?Set AUTH_SECRET_KEY}
      ACCESS_TOKEN_EXPIRE_MINUTES: ${ACCESS_TOKEN_EXPIRE_MINUTES:-480}
      INITIAL_ADMIN_USERNAME: ${INITIAL_ADMIN_USERNAME:-admin}
      INITIAL_ADMIN_PASSWORD: ${INITIAL_ADMIN_PASSWORD:?Set INITIAL_ADMIN_PASSWORD}
      UPLOAD_DIR: /app/uploads
      UPLOAD_URL_PREFIX: /uploads
      MAX_UPLOAD_SIZE_MB: ${MAX_UPLOAD_SIZE_MB:-20}
      LOG_LEVEL: ${LOG_LEVEL:-INFO}
    volumes:
      - backend_uploads:/app/uploads
    ports:
      - "8000:8000"
    restart: unless-stopped

  frontend:
    build:
      context: ../China_Web_FE
      args:
        VITE_API_BASE_URL: ${VITE_API_BASE_URL:-http://localhost:8000/api/v1}
        VITE_LANGUAGE_CODE: ${VITE_LANGUAGE_CODE:-en}
    depends_on:
      - backend
    ports:
      - "8080:80"
    restart: unless-stopped

volumes:
  postgres_data:
  backend_uploads:
